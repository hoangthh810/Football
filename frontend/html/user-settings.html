<!doctype html>
<html lang="vi">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Cài đặt tài khoản - MatchVision AI</title>
    <link rel="stylesheet" href="../css/common.css" />
    <link rel="stylesheet" href="../css/dashboard.css" />
    <link rel="stylesheet" href="../css/settings.css" />
  </head>
  <body class="dashboard-page" data-protected-role="user">
    <aside class="sidebar">
      <a class="brand" href="index.html"><span class="brand-mark">MV</span><span><strong>MatchVision</strong><small>User workspace</small></span></a>
      <nav class="side-nav">
        <a href="user-upload.html">Upload dữ liệu</a>
        <a href="user-results.html">Kết quả phân tích</a>
        <a class="active" href="user-settings.html">Cài đặt tài khoản</a>
        <a href="login.html">Đăng xuất</a>
      </nav>
    </aside>
    <main class="dashboard-main">
      <header class="dashboard-header">
        <div><p class="eyebrow">Account</p><h1>Cài đặt tài khoản</h1></div>
      </header>

      <section class="profile-shell">
        <div class="panel profile-panel">
          <div class="profile-header">
            <div class="profile-avatar" id="profileAvatar" aria-hidden="true">MV</div>
            <div>
              <p class="eyebrow">Profile</p>
              <h2 id="profileName">Đang tải hồ sơ...</h2>
              <p id="profileEmail">Đang đồng bộ dữ liệu tài khoản từ backend.</p>
            </div>
            <span class="status-pill" id="profileRole">...</span>
          </div>

          <dl class="profile-fields">
            <div>
              <dt>Họ tên</dt>
              <dd id="profileFullname">...</dd>
            </div>
            <div>
              <dt>Email</dt>
              <dd id="profileEmailField">...</dd>
            </div>
            <div>
              <dt>Vai trò</dt>
              <dd id="profileRoleField">...</dd>
            </div>
          </dl>

          <p class="profile-status" id="profileStatus">Đang tải thông tin hồ sơ.</p>
        </div>
      </section>
    </main>
    <script src="../js/auth-guard.js"></script>
    <script src="../js/user-settings.js"></script>
  </body>
</html>
